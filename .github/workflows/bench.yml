name: Benchmark Gate

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: bench-${{ github.head_ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  MODEL_REPO: bartowski/Llama-3.2-1B-Instruct-GGUF
  MODEL_FILE: Llama-3.2-1B-Instruct-Q4_K_M.gguf
  MODEL_DIR: /home/runner/.cache/ferrumox/models
  BENCH_PORT: 8090
  BENCH_CONCURRENCY: 1
  BENCH_REQUESTS: 10
  BENCH_MAX_TOKENS: 32
  BENCH_MODEL: Llama-3.2-1B-Instruct-Q4_K_M
  BENCH_PROMPT: "Write one sentence about Rust."

jobs:
  bench:
    name: Regression Check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libclang-dev jq

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: bench-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: bench-cargo-

      - name: Cache model
        id: model-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.MODEL_DIR }}
          key: bench-model-llama32-1b-q4km-v1

      - name: Download model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$MODEL_DIR"
          curl -fSL --retry 3 -o "$MODEL_DIR/$MODEL_FILE" \
            "https://huggingface.co/$MODEL_REPO/resolve/main/$MODEL_FILE"

      # Save the gate script before checking out base (it may not exist there)
      - name: Save gate script
        run: cp scripts/bench-gate.sh /tmp/bench-gate.sh && chmod +x /tmp/bench-gate.sh

      # ── PR branch ──────────────────────────────────────────────────
      - name: Build (PR)
        run: cargo build --release --bin fox --bin fox-bench

      - name: Benchmark (PR)
        run: |
          ./target/release/fox serve \
            --model-path "$MODEL_DIR/$MODEL_FILE" \
            --port "$BENCH_PORT" &
          FOX_PID=$!
          trap 'kill $FOX_PID 2>/dev/null; wait $FOX_PID 2>/dev/null' EXIT

          for i in $(seq 1 120); do
            curl -sf "http://localhost:$BENCH_PORT/health" >/dev/null 2>&1 && break
            sleep 1
          done

          # Warmup request (first inference is always slower)
          curl -sf -X POST "http://localhost:$BENCH_PORT/v1/chat/completions" \
            -H 'Content-Type: application/json' \
            -d "{\"model\":\"$BENCH_MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":4}" \
            >/dev/null 2>&1 || true

          ./target/release/fox-bench \
            --url "http://localhost:$BENCH_PORT" \
            --model "$BENCH_MODEL" \
            --concurrency "$BENCH_CONCURRENCY" \
            --requests "$BENCH_REQUESTS" \
            --max-tokens "$BENCH_MAX_TOKENS" \
            --prompt "$BENCH_PROMPT" \
            --output json > /tmp/bench-pr.json

          kill "$FOX_PID" 2>/dev/null; wait "$FOX_PID" 2>/dev/null || true
          trap - EXIT

          echo "=== PR branch results ==="
          jq '.primary | {ttft_p50_ms, ttft_p95_ms, throughput_tokens_per_sec}' /tmp/bench-pr.json

      # ── Base branch ────────────────────────────────────────────────
      - name: Checkout base
        run: |
          git checkout "${{ github.event.pull_request.base.sha }}"
          git submodule update --recursive

      - name: Build (base)
        run: cargo build --release --bin fox --bin fox-bench

      - name: Benchmark (base)
        run: |
          ./target/release/fox serve \
            --model-path "$MODEL_DIR/$MODEL_FILE" \
            --port "$BENCH_PORT" &
          FOX_PID=$!
          trap 'kill $FOX_PID 2>/dev/null; wait $FOX_PID 2>/dev/null' EXIT

          for i in $(seq 1 120); do
            curl -sf "http://localhost:$BENCH_PORT/health" >/dev/null 2>&1 && break
            sleep 1
          done

          curl -sf -X POST "http://localhost:$BENCH_PORT/v1/chat/completions" \
            -H 'Content-Type: application/json' \
            -d "{\"model\":\"$BENCH_MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}],\"max_tokens\":4}" \
            >/dev/null 2>&1 || true

          ./target/release/fox-bench \
            --url "http://localhost:$BENCH_PORT" \
            --model "$BENCH_MODEL" \
            --concurrency "$BENCH_CONCURRENCY" \
            --requests "$BENCH_REQUESTS" \
            --max-tokens "$BENCH_MAX_TOKENS" \
            --prompt "$BENCH_PROMPT" \
            --output json > /tmp/bench-base.json

          kill "$FOX_PID" 2>/dev/null; wait "$FOX_PID" 2>/dev/null || true
          trap - EXIT

          echo "=== Base branch results ==="
          jq '.primary | {ttft_p50_ms, ttft_p95_ms, throughput_tokens_per_sec}' /tmp/bench-base.json

      # ── Compare ────────────────────────────────────────────────────
      - name: Return to PR branch
        run: git checkout "${{ github.sha }}"

      - name: Check for regressions
        id: gate
        run: /tmp/bench-gate.sh /tmp/bench-base.json /tmp/bench-pr.json

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f /tmp/bench-comment.md ]; then
            # Delete previous bench comments from this bot
            gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              --jq '.[] | select(.body | startswith("## Benchmark")) | .id' \
            | while read -r id; do
              gh api -X DELETE "repos/${{ github.repository }}/issues/comments/$id" || true
            done
            gh pr comment "${{ github.event.pull_request.number }}" \
              --body-file /tmp/bench-comment.md
          fi
