name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc*'

# Two reliable Linux x86_64 targets: a plain CPU build (broad compatibility) and a
# Vulkan build (AMD/Intel iGPUs and any Vulkan GPU). Both validated. Other platforms
# (ROCm bundle, aarch64, macOS, Windows) can be re-added once each is verified.

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # CPU — built on 22.04 for broad glibc compatibility.
          - name: x86_64-linux
            runner: ubuntu-22.04
            suffix: ""
            gpu_deps: ""
          # Vulkan — needs Ubuntu 24.04 for glslc/spirv-headers. The resulting binary
          # needs glibc 2.39+ and a Vulkan driver at runtime (Mesa RADV/ANV, etc.).
          - name: x86_64-linux-vulkan
            runner: ubuntu-24.04
            suffix: "-vulkan"
            gpu_deps: "glslc glslang-tools libvulkan-dev spirv-headers"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Separate keys per variant so a CPU build's cmake configuration can't
          # leak into the Vulkan build's target cache (or vice versa).
          key: ${{ matrix.runner }}-release${{ matrix.suffix }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.runner }}-release${{ matrix.suffix }}-

      - name: Install build dependencies
        # llama.cpp's ggml-vulkan CMake needs both the Vulkan/glslc tooling AND
        # SPIRV-Headers. build.rs auto-enables the Vulkan backend when they're present.
        run: |
          sudo apt-get update -q
          sudo apt-get install -y build-essential cmake clang libclang-dev ninja-build ${{ matrix.gpu_deps }}

      - name: Build
        run: cargo build --release --bin fox --bin fox-bench

      - name: Package tarball
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="fox-${VERSION}-x86_64-unknown-linux-gnu${{ matrix.suffix }}.tar.gz"
          RELEASE_DIR="target/release"
          # Bundle binaries + any backend shared libraries built alongside them
          # (fox has RPATH=$ORIGIN, so it finds them in the same directory).
          FILES=(fox fox-bench)
          for so in "$RELEASE_DIR"/libggml*.so* "$RELEASE_DIR"/libllama*.so*; do
            [[ -f "$so" ]] && FILES+=("$so")
          done
          tar czf "$TARBALL" -C "$RELEASE_DIR" "${FILES[@]##*/}"
          sha256sum "$TARBALL" > "${TARBALL}.sha256"
          echo "ASSET=$TARBALL" >> "$GITHUB_ENV"
          echo "ASSET_SHA256=${TARBALL}.sha256" >> "$GITHUB_ENV"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET_SHA256 }}
