name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            use_cross: false
            features: ""
            ext: ""
            archive: tar
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            use_cross: true
            features: ""
            ext: ""
            archive: tar
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            features: ""
            ext: ""
            archive: tar
            libclang_path: /opt/homebrew/opt/llvm/lib
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            features: ""
            ext: ".exe"
            archive: zip

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install build dependencies (Linux native)
        if: runner.os == 'Linux' && !matrix.use_cross
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang libclang-dev ninja-build

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake llvm ninja
          echo "LIBCLANG_PATH=${{ matrix.libclang_path }}" >> "$GITHUB_ENV"

      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "1.3.280.0"
          $url = "https://sdk.lunarg.com/sdk/download/$version/windows/VulkanSDK-$version-Installer.exe"
          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe
          Start-Process -FilePath VulkanSDK.exe `
            -ArgumentList "--accept-licenses --default-answer --confirm-command install" `
            -Wait
          "VULKAN_SDK=C:\VulkanSDK\$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "C:\VulkanSDK\$version\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native, no features)
        if: "!matrix.use_cross && matrix.features == ''"
        run: cargo build --release --bin fox --bin fox-bench --target ${{ matrix.target }}

      - name: Build (native, with features)
        if: "!matrix.use_cross && matrix.features != ''"
        run: cargo build --release --bin fox --bin fox-bench --target ${{ matrix.target }} --features ${{ matrix.features }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --bin fox --bin fox-bench --target ${{ matrix.target }}

      - name: Package tarball (Unix)
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          TARBALL="fox-${VERSION}-${TARGET}.tar.gz"
          RELEASE_DIR="target/$TARGET/release"
          # Include binaries + all backend shared libraries so the tarball is self-contained.
          # The fox binary has RPATH=$ORIGIN, so it finds .so files in the same directory.
          FILES=(fox fox-bench)
          for so in "$RELEASE_DIR"/libggml*.so; do
            [[ -f "$so" ]] && FILES+=("$so")
          done
          tar czf "$TARBALL" -C "$RELEASE_DIR" "${FILES[@]##*/}"
          sha256sum "$TARBALL" > "${TARBALL}.sha256"
          echo "ASSET=$TARBALL" >> "$GITHUB_ENV"
          echo "ASSET_SHA256=${TARBALL}.sha256" >> "$GITHUB_ENV"

      - name: Package zip (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "$env:GITHUB_REF_NAME" -replace '^v', ''
          $target  = "${{ matrix.target }}"
          $zip     = "fox-${version}-${target}.zip"
          $releaseDir = "target\$target\release"
          # Collect binaries + all backend DLLs (ggml-*.dll) for a self-contained zip.
          $files = @(
            "$releaseDir\fox.exe",
            "$releaseDir\fox-bench.exe"
          ) + (Get-ChildItem "$releaseDir\ggml-*.dll" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName)
          Compress-Archive -Path $files -DestinationPath $zip
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  $zip" | Out-File -FilePath "${zip}.sha256" -Encoding utf8
          "ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSET_SHA256=${zip}.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-beta') }}
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET_SHA256 }}
