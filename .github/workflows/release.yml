name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc*'

# NOTE: simplified to a single reliable target (x86_64 linux) for now. The
# previous multi-platform matrix (ROCm bundle, aarch64 cross, macOS, Windows +
# Vulkan) was fragile and failed often. Re-add platforms one at a time once each
# is verified — GPU users can meanwhile use the Docker image or build locally.

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build x86_64-unknown-linux-gnu
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang libclang-dev ninja-build

      - name: Build
        run: cargo build --release --bin fox --bin fox-bench

      - name: Package tarball
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="fox-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          RELEASE_DIR="target/release"
          # Bundle the binaries + any backend shared libraries built alongside them
          # (the fox binary has RPATH=$ORIGIN, so it finds them in the same dir).
          FILES=(fox fox-bench)
          for so in "$RELEASE_DIR"/libggml*.so* "$RELEASE_DIR"/libllama*.so*; do
            [[ -f "$so" ]] && FILES+=("$so")
          done
          tar czf "$TARBALL" -C "$RELEASE_DIR" "${FILES[@]##*/}"
          sha256sum "$TARBALL" > "${TARBALL}.sha256"
          echo "ASSET=$TARBALL" >> "$GITHUB_ENV"
          echo "ASSET_SHA256=${TARBALL}.sha256" >> "$GITHUB_ENV"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET_SHA256 }}
