name: Test Linux Build

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-test*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}${{ matrix.artifact_suffix }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_suffix: ""
          - target: x86_64-unknown-linux-gnu
            artifact_suffix: "-rocm"
            gpu_backend: rocm

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-${{ matrix.target }}${{ matrix.artifact_suffix }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-${{ matrix.target }}${{ matrix.artifact_suffix }}-cargo-

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang libclang-dev ninja-build

      - name: Install ROCm/HIP SDK
        if: matrix.gpu_backend == 'rocm'
        run: |
          wget -q -O - https://repo.radeon.com/rocm/rocm.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/rocm.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] \
            https://repo.radeon.com/rocm/apt/6.2 jammy main" \
            | sudo tee /etc/apt/sources.list.d/rocm.list
          sudo apt-get update -q
          sudo apt-get install -y \
            rocminfo=1.0.0.60200-66~22.04 \
            rocm-cmake=0.13.0.60200-66~22.04 \
            rocm-device-libs=1.0.0.60200-66~22.04
          sudo apt-get install -y rocm-hip-sdk
          echo "/opt/rocm/bin" >> "$GITHUB_PATH"
          echo "HIPCC=/opt/rocm/bin/hipcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --bin fox --bin fox-bench --target ${{ matrix.target }}
