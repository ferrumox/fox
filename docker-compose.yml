services:
  ferrumox:
    image: ferrumox/fox:latest
    ports:
      - "8080:8080"
    volumes:
      # Mount a local models directory so GGUF files are not baked into the image.
      - ./models:/models:ro
    environment:
      FOX_MODEL_PATH: /models/model.gguf
      FOX_HOST: 0.0.0.0
      FOX_PORT: "8080"
      FOX_MAX_CONTEXT_LEN: "4096"
      FOX_GPU_MEMORY_FRACTION: "0.9"
      FOX_MAX_BATCH_SIZE: "8"
    restart: unless-stopped
    # Optional: expose GPU to the container (requires nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  fox-test:
    image: fox-test:latest
    ports:
      - "8080:8080"
    volumes:
      - ~/.cache/ferrumox/models:/root/.cache/ferrumox/models:ro
    environment:
      FOX_HOST: 0.0.0.0
      FOX_PORT: "8080"
      FOX_MAX_CONTEXT_LEN: "4096"
      FOX_GPU_MEMORY_FRACTION: "0.9"
      FOX_MAX_BATCH_SIZE: "8"