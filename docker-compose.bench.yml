services:
  ferrumox-cpu:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ferrumox-models:/root/.cache/ferrumox/models
    environment:
      FOX_HOST: 0.0.0.0
      FOX_PORT: "8080"
      FOX_MAX_MODELS: "1"
      FOX_MAX_CONTEXT_LEN: "4096"
      NVIDIA_VISIBLE_DEVICES: ""
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12

  ferrumox-gpu:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    ports:
      - "8080:8080"
    volumes:
      - ferrumox-models:/root/.cache/ferrumox/models
    environment:
      FOX_HOST: 0.0.0.0
      FOX_PORT: "8080"
      FOX_MAX_MODELS: "1"
      FOX_MAX_CONTEXT_LEN: "4096"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12

  ollama-cpu:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      NVIDIA_VISIBLE_DEVICES: ""
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 3s
      retries: 12

  ollama-gpu:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 3s
      retries: 12

  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8000:8000"
    volumes:
      - vllm-models:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HF_TOKEN:-}"
    command: ["--model", "${VLLM_MODEL:-meta-llama/Llama-3.2-3B-Instruct}", "--dtype", "auto"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  ferrumox-models:
  ollama-models:
  vllm-models:
